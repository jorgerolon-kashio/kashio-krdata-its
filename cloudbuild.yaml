# Cloud Build: required when the trigger uses a custom build.service_account.
# One of: logs_bucket, default_logs_bucket_behavior, or logging CLOUD_LOGGING_ONLY/NONE.
# See: https://cloud.google.com/build/docs/securing-builds/configure-service-accounts
#
# Option B — use an Artifact Registry Docker repo that already exists (no new repo):
# Console: Artifact Registry → copy "Registry URL" host (e.g. europe-west1-docker.pkg.dev)
#           and the repository name (e.g. cloud-run-source-deploy).
# Trigger: Edit trigger → Substitution variables → add/override:
#   _AR_HOSTNAME = that host
#   _REPO        = that repository name
#   _IMAGE       = krdata-portal (or any image name; must be unique inside that repo)
#
# Default below matches the usual Cloud Run–created Docker repo in europe-west1.
# If your repo is multi-region US, set _AR_HOSTNAME to us-docker.pkg.dev in the trigger.
substitutions:
  _AR_HOSTNAME: europe-west1-docker.pkg.dev
  _REPO: cloud-run-source-deploy
  _IMAGE: krdata-portal

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - '-t'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_REPO/$_IMAGE:$SHORT_SHA'
      - '-t'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_REPO/$_IMAGE:latest'
      - .

images:
  - '$_AR_HOSTNAME/$PROJECT_ID/$_REPO/$_IMAGE:$SHORT_SHA'
  - '$_AR_HOSTNAME/$PROJECT_ID/$_REPO/$_IMAGE:latest'

options:
  # Required when the trigger uses a custom service account (see GCP error).
  logging: CLOUD_LOGGING_ONLY
  # Option (b): regional default bucket for build logs (works with custom SA).
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
