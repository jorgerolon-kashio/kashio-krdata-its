<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>IT Service Portal</title>
  <script>
    // Update document title if APP_NAME is provided
    (function () {
      const interval = setInterval(() => {
        if (window.env && window.env.APP_NAME && window.env.APP_NAME !== 'APP_NAME_PLACEHOLDER') {
          document.title = window.env.APP_NAME + ' IT Service Portal';
          clearInterval(interval);
        }
      }, 100);
      setTimeout(() => clearInterval(interval), 5000);
    })();
  </script>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <app-root></app-root>
</body>

</html>
